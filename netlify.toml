# Configuration Netlify pour MIDEESSI

[build]
  publish = "dist"
  command = "npm run build"

# Variables d'environnement pour le build
[build.environment]
  NODE_VERSION = "18"

# ============================================================
# 🚀 OPTIMISATIONS DE PERFORMANCE & COMPRESSION
# ============================================================

# HTML - Cache court avec revalidation (24h)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    X-Content-Type-Options = "nosniff"

# index.html - Toujours vérifier la version fraîche
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Pragma = "no-cache"

# manifest.json - Vérifier quotidien
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# service-worker.js - Toujours frais
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Assets avec hash (JS, CSS) - Cache 1 AN (immutable car hashé)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images publiques - Cache 6 mois
[[headers]]
  for = "/public/*"
  [headers.values]
    Cache-Control = "public, max-age=15778800, immutable"

# WebP images - Plus agressif (1 an)
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PNG/JPG - Cache 6 mois
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=15778800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=15778800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=15778800"

# API/Supabase - Pas de cache (données dynamiques)
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# ============================================================
# 🛡️ SECURITY HEADERS
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ============================================================
